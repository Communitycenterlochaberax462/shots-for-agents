name: ShotsForAgents
options:
  bundleIdPrefix: com.shotsforagents
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
targets:
  ShotsForAgents:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_FILE: SupportFiles/Info.plist
        CODE_SIGN_ENTITLEMENTS: SupportFiles/ShotsForAgents.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.shotsforagents.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts
      - package: FlyingFox
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  FlyingFox:
    url: https://github.com/swhitty/FlyingFox
    from: "0.26.0"
